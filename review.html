<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review | Centraus Structural Consulting LTD</title>
<meta name="description" content="Tell us how we did — leave a review for Centraus Structural Consulting, Christchurch.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230b1622'/%3E%3Ctext x='50' y='68' font-family='Arial' font-size='54' font-weight='bold' fill='%23c2954d' text-anchor='middle'%3EC%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Albert+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="review-wrap">
  <div class="review-card">
    <a href="index.html" class="brand-logo">C</a>
    <h1>How did we do?</h1>
    <p>Your feedback helps us keep our engineering and service sharp — and helps other Canterbury clients find us. Tap a star to begin.</p>
    <div class="star-pick" id="starPick">
      <button data-rating="5" aria-label="5 stars"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 6 6 .9-4.5 4.2 1 6.4L12 17l-5.5 2.5 1-6.4L3 8.9 9 8z"/></svg></button>
      <button data-rating="4" aria-label="4 stars"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 6 6 .9-4.5 4.2 1 6.4L12 17l-5.5 2.5 1-6.4L3 8.9 9 8z"/></svg></button>
      <button data-rating="3" aria-label="3 stars"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 6 6 .9-4.5 4.2 1 6.4L12 17l-5.5 2.5 1-6.4L3 8.9 9 8z"/></svg></button>
      <button data-rating="2" aria-label="2 stars"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 6 6 .9-4.5 4.2 1 6.4L12 17l-5.5 2.5 1-6.4L3 8.9 9 8z"/></svg></button>
      <button data-rating="1" aria-label="1 star"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 6 6 .9-4.5 4.2 1 6.4L12 17l-5.5 2.5 1-6.4L3 8.9 9 8z"/></svg></button>
    </div>
    <div class="star-hint" id="starHint">Tap a star to rate your experience</div>
    <div class="review-foot">Prefer to talk? Call <a href="tel:+6421356751">021 356751</a> · <a href="index.html">Back to site</a></div>
  </div>
</div>
<script>
(function(){
  var GOOGLE_REVIEW_URL = "https://g.page/r/PLACEHOLDER";
  var pick = document.getElementById("starPick");
  var hint = document.getElementById("starHint");
  pick.querySelectorAll("button").forEach(function(btn){
    btn.addEventListener("mouseenter", function(){ hint.textContent = btn.getAttribute("data-rating") + " star" + (btn.getAttribute("data-rating")==="1"?"":"s"); });
    btn.addEventListener("click", function(){
      var r = parseInt(btn.getAttribute("data-rating"),10);
      pick.querySelectorAll("button").forEach(function(b){ b.classList.remove("lit"); });
      btn.classList.add("lit");
      hint.textContent = "Thanks! Taking you there…";
      setTimeout(function(){
        if (r >= 4) { window.location.href = GOOGLE_REVIEW_URL; }
        else { window.location.href = "private.html?rating=" + r; }
      }, 450);
    });
  });
})();
</script>
</body>
</html>
